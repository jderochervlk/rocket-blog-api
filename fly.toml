# fly.toml app configuration file generated for rocket-blog-api on 2026-07-17T15:27:06Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rocket-blog-api'
primary_region = 'ewr'

[build]

[env]
  PORT = '8080'
  ROCKET_ADDRESS = '0.0.0.0'
  ROCKET_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
